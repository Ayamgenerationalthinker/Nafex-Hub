packages:
  - artifacts/*
  - lib/*
  - lib/integrations/*
  - scripts

allowBuilds:
  esbuild: set this to true or false
  unrs-resolver: set this to true or false

autoInstallPeers: false

catalog:
  '@replit/vite-plugin-cartographer': ^0.5.1
  '@replit/vite-plugin-dev-banner': ^0.1.1
  '@replit/vite-plugin-runtime-error-modal': ^0.0.6
  '@tailwindcss/vite': ^4.1.14
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  '@vitejs/plugin-react': ^5.0.4
  class-variance-authority: ^0.7.1
  clsx: ^2.1.1
  drizzle-orm: ^0.45.2
  framer-motion: ^12.23.24
  lucide-react: ^0.545.0
  react: 19.1.0
  react-dom: 19.1.0
  tailwind-merge: ^3.3.1
  tailwindcss: ^4.1.14
  tsx: ^4.21.0
  vite: ^7.3.2
  wouter: ^3.3.5
  zod: 3.25.76

minimumReleaseAge: 1440

minimumReleaseAgeExclude:
  - '@replit/*'
  - stripe-replit-sync

onlyBuiltDependencies:
  - '@swc/core'
  - bcrypt
  - esbuild
  - msw
  - unrs-resolver

overrides:
  # ── Security patches ────────────────────────────────────────────────────────
  # path-to-regexp DoS (GHSA-j3q9-mxjg-w52f) — used by express router
  path-to-regexp: ^8.4.0
  # lodash code injection (>=4.18.0) + prototype pollution (via cloudinary)
  lodash: ^4.18.0
  # fast-uri path traversal + host confusion (via vite-plugin-pwa workbox chain)
  fast-uri: ^3.1.2
  # yaml stack overflow via deeply nested input (via vite)
  yaml: ^2.9.0
  # ws uninitialized-memory disclosure (GHSA-58qx-3vcg-4xpx) — used by socket.io
  ws: ^8.20.1
  # ip-address XSS (GHSA-v2v4-37r5-5v8g) — used by express-rate-limit
  ip-address: ^10.1.1
  # serialize-javascript RCE (GHSA-5c6j-r48x-rmvq) — used by vite-plugin-pwa build toolchain
  serialize-javascript: ^7.0.5
  # picomatch ReDoS (GHSA-c2c7-rcm5-vvqj) — used by vite and fast-glob
  picomatch: ^4.0.4
  # postcss XSS in CSS stringify (GHSA-qx2v-qp2m-jg93) — used by vite
  postcss: ^8.5.10
  # @babel/plugin-transform-modules-systemjs code injection (GHSA via workbox-build build chain)
  '@babel/plugin-transform-modules-systemjs': ^7.29.4
  # ────────────────────────────────────────────────────────────────────────────
  '@esbuild-kit/esm-loader': npm:tsx@^4.21.0

