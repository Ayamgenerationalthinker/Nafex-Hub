[variables]
NODE_VERSION = "20"
NODE_ENV = "production"
REPL_ID = ""

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile --prod=false"]

[phases.build]
cmds = [
  "pnpm run typecheck:libs",
  "pnpm --filter @workspace/nafex-hub run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node artifacts/api-server/dist/index.mjs"
