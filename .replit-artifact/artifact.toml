kind = "web"
previewPath = "/"
title = "Nafex Hub"
version = "1.0.0"
id = "artifacts/nafex-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18782

[services.development]
run = "pnpm --filter @workspace/nafex-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nafex-hub", "run", "build" ]
publicDir = "artifacts/nafex-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18782"
BASE_PATH = "/"
