      type: object
      properties:
        businessId:
          type: integer
          nullable: true
        productId:
          type: integer
          nullable: true

    FavoritesResponse:
      type: object
      properties:
        businesses:
          type: array
          items:
            type: object
            additionalProperties: true
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - businesses
        - products

    # ── Notifications ──────────────────────────────────

    Notification:
      type: object
      properties:
