        verifiedBusinesses:
          type: integer
        totalCategories:
          type: integer
        featuredBrands:
          type: integer
      required:
        - totalBusinesses
        - verifiedBusinesses
        - totalCategories
        - featuredBrands

    # ── Reviews ──────────────────────────────────

    Review:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        businessId:
          type: integer
        rating:
          type: integer
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
        userName:
          type: string
      required:
        - id
        - userId
        - businessId
        - rating
        - comment
        - createdAt

    CreateReviewBody:
      type: object
      properties:
        businessId:
          type: integer
        rating:
          type: integer
        comment:
          type: string
      required:
        - businessId
        - rating
        - comment

    # ── Conversations / Messages ──────────────────

    ConversationWithDetails:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        businessId:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        businessName:
          type: string
        businessLogo:
          type: ["string", "null"]
        lastMessage:
          type: ["string", "null"]
      required:
        - id
        - userId
        - businessId
        - createdAt
        - updatedAt

    CreateConversationBody:
      type: object
      properties:
        businessId:
          type: integer
      required:
        - businessId

    Message:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
        text:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - senderId
        - text
        - createdAt

    SendMessageBody:
      type: object
      properties:
        text:
          type: string
      required:
        - text

    # ── Orders ──────────────────────────────────

    OrderItem:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: integer
        price:
          type: integer
      required:
        - name
        - quantity
        - price

    Order:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        businessId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalPrice:
          type: integer
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - businessId
        - items
        - totalPrice
        - status
        - createdAt
        - updatedAt

    OrderWithBusiness:
      allOf:
        - $ref: "#/components/schemas/Order"
        - type: object
          properties:
            businessName:
              type: string
            businessLogo:
              type: ["string", "null"]

    CreateOrderBody:
      type: object
      properties:
        businessId:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        totalPrice:
          type: integer
        notes:
          type: string
      required:
        - businessId
        - items
        - totalPrice

    UpdateOrderStatusBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered, cancelled]
      required:
        - status

    # ── Analytics ──────────────────────────────────

    TrackEventBody:
      type: object
      properties:
        businessId:
          type: integer
        type:
          type: string
          enum: [view, message, order]
      required:
        - businessId
        - type

    DailyStatPoint:
      type: object
      properties:
        date:
          type: string
        views:
