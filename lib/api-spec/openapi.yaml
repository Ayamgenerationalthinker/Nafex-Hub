        - averageRating
        - profileViews

    # ── Products ──────────────────────────────────

    Product:
      type: object
      properties:
        id:
          type: integer
        businessId:
          type: integer
        collectionId:
          type: integer
          nullable: true
        name:
          type: string
        description:
          type: string
        price:
          type: string
        images:
          type: array
          items:
            type: string
        stock:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        businessName:
          type: string
        businessLogo:
          type: string
      required:
        - id
        - businessId
        - name
        - description
        - price
        - images
        - createdAt
        - updatedAt

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: string
        images:
          type: array
          items:
            type: string
        stock:
          type: integer
          nullable: true
        collectionId:
          type: integer
          nullable: true
      required:
        - name
        - price

    UpdateProductCollectionBody:
      type: object
      properties:
        collectionId:
          type: integer
          nullable: true
      required:
        - collectionId

    UpdateStockBody:
      type: object
      properties:
